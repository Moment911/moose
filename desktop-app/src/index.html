<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KotoIQ</title>
  <meta http-equiv="refresh" content="0; url=https://hellokoto.com/kotoiq" />
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .loader { text-align: center; }
    .spinner { width: 48px; height: 48px; border: 3px solid #333; border-top-color: #14b8a6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div>Loading KotoIQ…</div>
  </div>
  <script>window.location.href = 'https://hellokoto.com/kotoiq';</script>
</body>
</html>
