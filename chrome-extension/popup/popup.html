<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>KotoIQ SEO Intel</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="hdr">
      <div class="logo-row">
        <div class="logo-mark">K</div>
        <div>
          <div class="logo-name">KotoIQ</div>
          <div class="logo-sub">SEO Intelligence</div>
        </div>
      </div>
      <div class="status" id="api-status" title="API connection status">
        <span class="dot" id="status-dot"></span>
        <span id="status-label">Checking&hellip;</span>
      </div>
    </header>

    <div class="url-block">
      <div class="url-label">CURRENT PAGE</div>
      <div class="url-value" id="page-url">&mdash;</div>
      <div class="client-row">
        <label for="client-select">Client:</label>
        <select id="client-select">
          <option value="">Loading&hellip;</option>
        </select>
      </div>
    </div>

    <div class="action-grid">
      <button class="action" data-action="analyze_on_page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
        <span>Run On-Page Audit</span>
      </button>

      <button class="action" data-action="extract_competitor_topical_map">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        <span>Extract Topical Map</span>
      </button>

      <button class="action" data-action="score_multi_engine_aeo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.663 17h4.673M12 3v1M17.657 6.343l-.707.707M21 12h-1M4 12H3M6.343 6.343l-.707-.707M8 17.466A8 8 0 1 1 16 17.466"/></svg>
        <span>Score AEO Eligibility</span>
      </button>

      <button class="action" data-action="check_plagiarism">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Check Plagiarism</span>
      </button>

      <button class="action" data-action="generate_triples">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>Extract Triples (Schema)</span>
      </button>
    </div>

    <div class="results" id="results">
      <div class="results-empty">Click any action above to run it on the current page.</div>
    </div>

    <footer class="ftr">
      <a href="#" id="open-settings">Settings</a>
      <span class="ftr-sep">&middot;</span>
      <span id="version">v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
